<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utica Railfan Control Center</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #05070a;
    color: #d0d7de;
}

/* TOP BAR */
#topbar {
    background: #0b1220;
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid #1f2a3a;
    gap: 8px;
}

#title {
    color: #00ff88;
    font-weight: bold;
    font-size: 16px;
}

#status {
    margin-left: auto;
    font-size: 12px;
    color: #7ee787;
}

/* FIXED GRID */
#grid {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    grid-template-rows: 1.2fr 1fr;
    gap: 12px;
    padding: 12px;
    height: 100dvh;
}

.panel {
    background: #0a0f18;
    border: 1px solid #1f2a3a;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 10px;
    font-size: 14px;
    font-weight: bold;
    background: #0b1220;
    border-bottom: 1px solid #1f2a3a;
}

video {
    width:100%;
    height:100%;
    min-height:220px;
    background:black;
}

.cam-buttons {
    display:flex;
    gap:6px;
    padding:8px;
    background:#0b1220;
    flex-wrap:wrap;
}

button{
    flex:1;
    min-width:90px;
    padding:10px;
    background:#111a2b;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    flex:1;
}

.alert{
    padding:10px;
    border-bottom:1px solid #141c2b;
}
.alert.high{border-left:4px solid #ff4d4d;}
.alert.med{border-left:4px solid #ffcc00;}
.alert.low{border-left:4px solid #00ff88;}

.badge{
    font-size:11px;
    padding:3px 6px;
    border-radius:6px;
    margin-left:8px;
}
.live{background:#00aa44;}

@media(max-width:900px){
    #grid{
        display:flex;
        flex-direction:column;
        height:auto;
        min-height:100dvh;
    }
    .panel{min-height:420px;}
    iframe{min-height:350px;}
    video{min-height:260px;}
    #status{margin-left:0;width:100%;}
}

/* HEAT METER */
#heatContainer{padding:10px;border-bottom:1px solid #141c2b;}
#heatLabel{font-size:13px;margin-bottom:6px;}
#heatBar{width:100%;height:12px;background:#1a263d;border-radius:6px;overflow:hidden;}
#heatFill{height:100%;width:15%;background:#00ff88;transition:width .6s ease,background .6s ease;}

</style>
</head>
<body>

<div id="topbar">
<div id="title">📍 Utica Train Station</div>
<div id="status">● 3-CAMERA LIVE SYSTEM</div>
</div>

<div id="grid">

<div class="panel">
<div class="header">🎥 Live Rail Camera <span class="badge live">LIVE</span></div>
<video id="video" controls autoplay muted></video>
<div class="cam-buttons">
<button onclick="setCam(0)">I-481 Syracuse</button>
<button onclick="setCam(1)">Sauquoit Creek</button>
<button onclick="setCam(2)">Fonda NY</button>
</div>
</div>

<div class="panel">
<div class="header">🚆 Amtrak Tracker</div>
<iframe src="https://asm.transitdocs.com/"></iframe>
</div>

<div class="panel">
<div class="header">📡 Rail Radio</div>
<iframe src="https://www.broadcastify.com/listen/feed/36253"></iframe>
</div>

<div class="panel">
<div class="header">🔔 Live Alerts</div>
<div id="heatContainer">
<div id="heatLabel">🌡 Utica Corridor Activity Heat</div>
<div id="heatBar"><div id="heatFill"></div></div>
</div>
<div id="alerts" style="padding:10px;"></div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const cams=[
{name:"I-481 Syracuse",url:"https://s51.nysdot.skyvdn.com/rtplive/R3_003/playlist.m3u8"},
{name:"Sauquoit Creek",url:"https://s7.nysdot.skyvdn.com/rtplive/R2_035/playlist.m3u8"},
{name:"Fonda NY",url:"https://s9.nysdot.skyvdn.com/rtplive/R2_041/playlist.m3u8"}
];

let current=0,hls;
const video=document.getElementById("video");
const alertsBox=document.getElementById("alerts");
const heatFill=document.getElementById("heatFill");

function updateAlerts(){
 let minute=new Date().getMinutes();
 let message="No train activity detected near Utica corridor.";
 let type="low";
 let heat=15;
 if(minute%10===0){message="🚆 Corridor activity window OPEN — monitor cameras.";type="med";heat=55;}
 if(minute%25===0){message="🚆 Higher probability train movement near Utica.";type="high";heat=90;}
 if(minute%37===0){message="🚆 Possible Amtrak movement on Empire Corridor.";type="med";heat=70;}
 alertsBox.innerHTML=`<div class="alert ${type}">
 <div><strong>Corridor Status</strong></div>
 <div>${message}</div></div>`;
}
setInterval(updateAlerts,15000);
updateAlerts();

function loadCam(i){
 current=i;
 if(hls){hls.destroy();}
 hls=new Hls({liveSyncDuration:3,liveMaxLatencyDuration:10});
 hls.loadSource(cams[i].url);
 hls.attachMedia(video);
 hls.on(Hls.Events.ERROR,()=>setTimeout(()=>loadCam(current),3000));
}
function setCam(i){loadCam(i);}
loadCam(0);
</script>
</body>
</html>
